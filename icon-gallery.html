<title>Icon Gallery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d14;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 32px 24px 64px;
    min-height: 100vh;
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    color: #FF2D78;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 32px;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .badge {
    background: #FF2D78;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
    min-width: 120px;
    text-align: center;
  }

  .btn {
    background: #1a1a2e;
    border: 1.5px solid #333;
    color: #ccc;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn:hover { border-color: #FF2D78; color: #fff; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
  }

  .card {
    background: #131320;
    border: 2px solid #1e1e35;
    border-radius: 16px;
    padding: 20px 12px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
    position: relative;
  }
  .card:hover { border-color: #444; transform: translateY(-2px); }
  .card.liked {
    border-color: #FF2D78;
    background: #1f0a12;
  }

  .card-icon { width: 64px; height: 64px; }
  .card-icon svg { width: 64px; height: 64px; }

  .card-name {
    font-size: 11px;
    font-weight: 700;
    color: #888;
    text-align: center;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .card.liked .card-name { color: #FF2D78; }

  .check-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 20px;
    height: 20px;
    background: #FF2D78;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 900;
    color: white;
  }
  .card.liked .check-badge { display: flex; }

  /* Variant badge for icons shown multiple times */
  .variant-label {
    font-size: 10px;
    color: #555;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-top: -6px;
  }

  /* Summary panel */
  .summary {
    margin-top: 48px;
    padding: 24px;
    background: #131320;
    border: 1.5px solid #1e1e35;
    border-radius: 16px;
    display: none;
  }
  .summary.visible { display: block; }
  .summary h2 {
    font-size: 16px;
    font-weight: 800;
    color: #FF2D78;
    margin-bottom: 12px;
  }
  .summary-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .summary-chip {
    background: #FF2D7820;
    border: 1.5px solid #FF2D7866;
    color: #FF2D78;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 12px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 12px;
    margin-top: 32px;
  }
</style>
</head>
<body>

<h1>Icon Gallery</h1>
<p class="subtitle">Click any icon to mark it as liked. Click again to unmark.</p>

<div class="toolbar">

<div class="grid" id="grid"></div>

<div class="summary" id="summary">

    svg: `<svg viewBox="0 0 100 100"><polygon points="18,76 38,76 22,97" fill="#FFD54F"/><rect x="8" y="8" width="84" height="68" rx="16" fill="#FFD54F" stroke="#111111" stroke-width="5"/><line x1="18" y1="75" x2="22" y2="97" stroke="#111111" stroke-width="5" stroke-linecap="round"/><line x1="38" y1="75" x2="22" y2="97" stroke="#111111" stroke-width="5" stroke-linecap="round"/><line x1="28" y1="24" x2="72" y2="60" stroke="#111111" stroke-width="14" stroke-linecap="round"/><line x1="72" y1="24" x2="28" y2="60" stroke="#111111" stroke-width="14" stroke-linecap="round"/><line x1="28" y1="24" x2="72" y2="60" stroke="#FF2D78" stroke-width="9" stroke-linecap="round"/><line x1="72" y1="24" x2="28" y2="60" stroke="#FF2D78" stroke-width="9" stroke-linecap="round"/></svg>`
  },
  {
    id: "WavelengthGameIcon",
    name: "Wavelength Icon",
    svg: `<svg viewBox="0 0 100 100"><path d="M14 68 A36 36 0 0 1 86 68" fill="none" stroke="#111111" stroke-width="18" stroke-linecap="round"/><path d="M14 68 A36 36 0 0 1 86 68" fill="none" stroke="#4FC3F7" stroke-width="12" stroke-linecap="round"/><path d="M14 68 A36 36 0 0 1 69 35" fill="none" stroke="#111111" stroke-width="18" stroke-linecap="round"/><path d="M14 68 A36 36 0 0 1 69 35" fill="none" stroke="#FFD54F" stroke-width="12" stroke-linecap="round"/><line x1="50" y1="68" x2="69" y2="35" stroke="#111111" stroke-width="11" stroke-linecap="round"/><line x1="50" y1="68" x2="69" y2="35" stroke="#FF2D78" stroke-width="7" stroke-linecap="round"/><circle cx="50" cy="68" r="11" fill="#111111"/><circle cx="50" cy="68" r="5" fill="white"/></svg>`
  },
];

const liked = new Set();

function renderGrid() {
  const grid = document.getElementById("grid");

  const allSections = [
    { label: null, items: icons },
    { label: "Game Icons", items: gameIcons }
  ];

  let html = "";
  allSections.forEach(({ label, items }, si) => {
    if (label) {
      html += `<div class="section-label" style="grid-column:1/-1;margin-top:${si===0?0:32}px">${label}</div>`;
    }
    items.forEach(icon => {
      html += `
        <div class="card" id="card-${icon.id}" onclick="toggle('${icon.id}', '${icon.name}')">
          <div class="check-badge">✓</div>
          <div class="card-icon">${icon.svg}</div>
          <div class="card-name">${icon.name}</div>
          ${icon.variant ? `<div class="variant-label">${icon.variant}</div>` : ""}
        </div>`;
    });
  });

  grid.innerHTML = html;
}

function toggle(id, name) {
  if (liked.has(id)) {
    liked.delete(id);
    document.getElementById("card-" + id).classList.remove("liked");
  } else {
    liked.add(id);
    document.getElementById("card-" + id).classList.add("liked");
  }
  updateCounter();
  updateSummary();
}

function updateCounter() {
  const el = document.getElementById("counter");
  const n = liked.size;
  el.textContent = n === 0 ? "0 liked" : n === 1 ? "1 liked" : `${n} liked`;
}

function updateSummary() {
  const panel = document.getElementById("summary");
  const list = document.getElementById("summaryList");
  if (liked.size === 0) {
    panel.classList.remove("visible");
    return;
  }
  panel.classList.add("visible");
  const allIcons = [...icons, ...gameIcons];
  list.innerHTML = [...liked].map(id => {
    const icon = allIcons.find(i => i.id === id);
    return `<span class="summary-chip">${icon ? icon.name : id}</span>`;
  }).join("");
}

function clearAll() {
  liked.clear();
  document.querySelectorAll(".card.liked").forEach(c => c.classList.remove("liked"));
  updateCounter();
  updateSummary();
}

function selectAll() {
  [...icons, ...gameIcons].forEach(icon => {
    liked.add(icon.id);
    const card = document.getElementById("card-" + icon.id);
    if (card) card.classList.add("liked");
  });
  updateCounter();
  updateSummary();
}

renderGrid();
</script>
</body>
</html>
