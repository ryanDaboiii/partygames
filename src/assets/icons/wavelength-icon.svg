<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Full gauge track: black outline -->
  <path d="M14 68 A36 36 0 0 1 86 68"
        fill="none" stroke="#111111" stroke-width="18" stroke-linecap="round"/>
  <!-- Full gauge track: sky blue fill -->
  <path d="M14 68 A36 36 0 0 1 86 68"
        fill="none" stroke="#4FC3F7" stroke-width="12" stroke-linecap="round"/>
  <!-- Yellow zone: black outline -->
  <path d="M14 68 A36 36 0 0 1 69 35"
        fill="none" stroke="#111111" stroke-width="18" stroke-linecap="round"/>
  <!-- Yellow zone fill -->
  <path d="M14 68 A36 36 0 0 1 69 35"
        fill="none" stroke="#FFD54F" stroke-width="12" stroke-linecap="round"/>
  <!-- Needle: black outline -->
  <line x1="50" y1="68" x2="69" y2="35" stroke="#111111" stroke-width="11" stroke-linecap="round"/>
  <!-- Needle: hot pink fill -->
  <line x1="50" y1="68" x2="69" y2="35" stroke="#FF2D78" stroke-width="7" stroke-linecap="round"/>
  <!-- Center hub -->
  <circle cx="50" cy="68" r="11" fill="#111111"/>
  <circle cx="50" cy="68" r="5" fill="white"/>
</svg>
